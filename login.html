<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Jessica Peña Nails Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* (TODO TU DISEÑO SE MANTIENE IGUAL) */
body { font-family: 'Nunito', sans-serif; background:#1a0030; display:flex; justify-content:center; align-items:center; height:100vh; color:white; }
.login-card { background:#2d004f; padding:30px; border-radius:15px; width:320px; text-align:center; }
input { width:100%; padding:10px; margin:10px 0; border-radius:8px; border:none; }
button { width:100%; padding:10px; background:#6A0DAD; color:white; border:none; border-radius:8px; cursor:pointer; }
button:hover { opacity:0.9; }
</style>
</head>

<body>

<div class="login-card">
  <h2>Jessica Peña Nails Spa</h2>

  <input type="email" id="username" placeholder="Correo electrónico">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="doLogin()">Iniciar Sesión</button>

  <p id="error" style="color:red;"></p>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "jessicapenabeautystudio.firebaseapp.com",
  databaseURL: "https://jessicapenabeautystudio-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "jessicapenabeautystudio",
  storageBucket: "jessicapenabeautystudio.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.doLogin = async function() {
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error");

  errorBox.textContent = "";

  if (!email || !password) {
    errorBox.textContent = "Completa todos los campos";
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    console.log("✅ Usuario logueado:", user.uid);

    // Guardar sesión
    sessionStorage.setItem("uid", user.uid);
    sessionStorage.setItem("email", user.email);

    // Guardar último acceso en BD (correcto con UID)
    await set(ref(db, "usuarios/" + user.uid + "/ultimoAcceso"), new Date().toISOString());

    // Redirigir
    window.location.href = "index.html";

  } catch (error) {
    console.error(error);

    if (error.code === "auth/user-not-found") {
      errorBox.textContent = "Usuario no existe";
    } else if (error.code === "auth/wrong-password") {
      errorBox.textContent = "Contraseña incorrecta";
    } else if (error.code === "auth/invalid-email") {
      errorBox.textContent = "Correo inválido";
    } else {
      errorBox.textContent = "Error al iniciar sesión";
    }
  }
};
</script>

</body>
</html>
