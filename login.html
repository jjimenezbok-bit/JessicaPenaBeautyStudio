<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Jessica Peña Nails Spa</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --c-deep:   #1a0030;
    --c-dark:   #3a006f;
    --c-mid:    #6A0DAD;
    --c-accent: #9b59b6;
    --c-light:  #c39bd3;
    --c-soft:   #e8d5f5;
    --c-white:  #ffffff;
    --c-danger: #e74c3c;
    --c-success:#2ecc71;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--c-deep);
    overflow: hidden;
    position: relative;
  }

  /* Fondo con orbes difuminados */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(106,13,173,0.35) 0%, transparent 70%);
    top: -120px; left: -120px;
    animation: drift1 12s ease-in-out infinite alternate;
  }
  .orb2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(155,89,182,0.25) 0%, transparent 70%);
    bottom: -100px; right: -80px;
    animation: drift2 15s ease-in-out infinite alternate;
  }
  .orb3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(195,155,211,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: drift3 9s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-30px,-40px); } }
  @keyframes drift3 { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.15); } }

  /* Puntos de fondo */
  .bg-dots {
    position: fixed; inset: 0; z-index: 0;
    background-image: radial-gradient(circle, rgba(195,155,211,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* Card principal */
  .login-card {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 20px;
    background: rgba(30, 5, 55, 0.72);
    border: 1px solid rgba(195,155,211,0.25);
    border-radius: 20px;
    padding: 44px 40px 36px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 32px 64px rgba(0,0,0,0.45),
      0 0 0 1px rgba(195,155,211,0.08) inset,
      0 1px 0 rgba(195,155,211,0.2) inset;
    animation: cardIn 0.5s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Borde superior iluminado */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--c-light), transparent);
  }

  /* Logo / cabecera */
  .card-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-ring {
    width: 68px; height: 68px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(106,13,173,0.6), rgba(195,155,211,0.3));
    border: 1px solid rgba(195,155,211,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    box-shadow: 0 0 28px rgba(106,13,173,0.5), 0 0 8px rgba(195,155,211,0.2) inset;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 28px rgba(106,13,173,0.5), 0 0 8px rgba(195,155,211,0.2) inset; }
    50%      { box-shadow: 0 0 42px rgba(155,89,182,0.7), 0 0 14px rgba(195,155,211,0.3) inset; }
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--c-white);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 11px;
    color: rgba(195,155,211,0.6);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* Formulario */
  .form-group {
    margin-bottom: 18px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(195,155,211,0.7);
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    pointer-events: none;
    opacity: 0.55;
  }
  .form-input {
    width: 100%;
    height: 46px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(195,155,211,0.22);
    border-radius: 10px;
    color: var(--c-white);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 0 44px 0 40px;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    -webkit-autofill: none;
  }
  .form-input::placeholder { color: rgba(195,155,211,0.35); font-weight: 400; }
  .form-input:focus {
    border-color: rgba(155,89,182,0.65);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(106,13,173,0.25);
  }
  .form-input.error {
    border-color: rgba(231,76,60,0.6);
    box-shadow: 0 0 0 3px rgba(231,76,60,0.15);
  }

  /* Ojo contraseña */
  .btn-eye {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(195,155,211,0.5);
    cursor: pointer; font-size: 16px;
    padding: 4px;
    transition: color 0.15s;
  }
  .btn-eye:hover { color: var(--c-light); }

  /* Historial datalist */
  datalist { display: none; }

  /* Mensaje de error */
  .error-msg {
    display: none;
    align-items: center;
    gap: 7px;
    background: rgba(231,76,60,0.12);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px;
    color: #f1948a;
    margin-bottom: 16px;
    animation: shake 0.35s ease;
  }
  .error-msg.show { display: flex; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  /* Botón de login */
  .btn-login {
    width: 100%;
    height: 48px;
    background: linear-gradient(135deg, var(--c-mid), var(--c-accent));
    border: none;
    border-radius: 10px;
    color: var(--c-white);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 18px rgba(106,13,173,0.4);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 4px;
  }
  .btn-login:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(106,13,173,0.55);
  }
  .btn-login:active:not(:disabled) { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

  /* Spinner */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  /* Cambiar contraseña */
  .btn-change {
    width: 100%;
    margin-top: 10px;
    background: none;
    border: 1px solid rgba(195,155,211,0.2);
    border-radius: 10px;
    color: rgba(195,155,211,0.6);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    height: 38px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-change:hover {
    background: rgba(195,155,211,0.1);
    color: var(--c-light);
    border-color: rgba(195,155,211,0.4);
  }

  /* Footer */
  .card-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 10px;
    color: rgba(195,155,211,0.35);
    letter-spacing: 0.08em;
  }

  /* Modal cambiar contraseña */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,0,20,0.75);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: rgba(30,5,55,0.95);
    border: 1px solid rgba(195,155,211,0.3);
    border-radius: 16px;
    padding: 32px 30px;
    width: 100%; max-width: 360px;
    margin: 20px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    animation: cardIn 0.3s ease both;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--c-white);
    margin-bottom: 20px;
    text-align: center;
  }
  .modal-btns {
    display: flex; gap: 10px; margin-top: 18px;
  }
  .modal-btns button {
    flex: 1; height: 40px; border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; border: none;
    transition: opacity 0.15s;
  }
  .modal-btns button:hover { opacity: 0.85; }
  .btn-save { background: linear-gradient(135deg,var(--c-mid),var(--c-accent)); color: #fff; }
  .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(195,155,211,0.8); border: 1px solid rgba(195,155,211,0.2) !important; }

  /* Notificación tipo toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(30,5,55,0.95);
    border: 1px solid rgba(195,155,211,0.35);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--c-soft);
    z-index: 200;
    transition: transform 0.35s cubic-bezier(.2,.8,.3,1), opacity 0.35s;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(46,204,113,0.4); color: #82e6a4; }
  .toast.error-t  { border-color: rgba(231,76,60,0.4); color: #f1948a; }
</style>
</head>
<body>

<div class="bg-dots"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<!-- ══ CARD LOGIN ══ -->
<div class="login-card">

  <div class="card-header">
    <div class="logo-ring">💅</div>
    <h1 class="card-title">Jessica Peña Nails Spa</h1>
    <p class="card-sub">Sistema de Gestión</p>
  </div>

  <div class="error-msg" id="errorMsg">
    <span>⚠️</span>
    <span id="errorText">Usuario o contraseña incorrectos</span>
  </div>

  <div class="form-group">
    <label class="form-label" for="username">Usuario</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input
        class="form-input"
        type="text"
        id="username"
        list="userHistory"
        placeholder="Ingresa tu usuario"
        autocomplete="username"
      >
      <datalist id="userHistory"></datalist>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Contraseña</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input
        class="form-input"
        type="password"
        id="password"
        placeholder="Ingresa tu contraseña"
        autocomplete="current-password"
      >
      <button class="btn-eye" id="eyeBtn" type="button" title="Mostrar/ocultar">👁️</button>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span class="btn-text">✦ Iniciar Sesión</span>
    <div class="spinner"></div>
  </button>

  <button class="btn-change" onclick="openModal()">
    🔑 Cambiar contraseña
  </button>

  <div class="card-footer">By James JB · Sistema Privado</div>
</div>

<!-- ══ MODAL CAMBIAR CONTRASEÑA ══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <p class="modal-title">🔑 Cambiar Contraseña</p>

    <div class="form-group">
      <label class="form-label">Usuario</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input class="form-input" type="text" id="m-user" placeholder="Tu usuario">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña actual</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="form-input" type="password" id="m-old" placeholder="Contraseña actual">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input class="form-input" type="password" id="m-new" placeholder="Nueva contraseña (mín. 4)">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar nueva</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input class="form-input" type="password" id="m-confirm" placeholder="Repite la nueva contraseña">
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="savePassword()">Guardar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── CONFIGURACIÓN FIREBASE ──
  // Reemplaza estos valores con los de tu proyecto Firebase
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "jessicapenabeautystudio.firebaseapp.com",
    databaseURL: "https://jessicapenabeautystudio-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jessicapenabeautystudio",
    storageBucket: "jessicapenabeautystudio.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── HISTORIAL LOCAL ──
  const HIST_KEY = 'nails_user_history';
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch { return []; }
  }
  function saveHistory(user) {
    let h = getHistory().filter(u => u !== user);
    h.unshift(user);
    if (h.length > 5) h = h.slice(0, 5);
    localStorage.setItem(HIST_KEY, JSON.stringify(h));
  }
  function loadHistory() {
    const dl = document.getElementById('userHistory');
    getHistory().forEach(u => {
      const opt = document.createElement('option');
      opt.value = u;
      dl.appendChild(opt);
    });
  }
  loadHistory();

  // ── OJO CONTRASEÑA ──
  document.getElementById('eyeBtn').addEventListener('click', () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // ── ENTER para login ──
  ['username','password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  // ── TOAST ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => { t.className = 'toast'; }, 3200);
  }

  // ── MOSTRAR / OCULTAR ERROR ──
  function showError(msg) {
    const box = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    box.classList.add('show');
    ['username','password'].forEach(id => document.getElementById(id).classList.add('error'));
    setTimeout(() => {
      box.classList.remove('show');
      ['username','password'].forEach(id => document.getElementById(id).classList.remove('error'));
    }, 3500);
  }

  // ══════════════════════════════════
  //   LOGIN  ← valida contra /usuarios
  // ══════════════════════════════════
  window.doLogin = async function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError('Completa todos los campos');
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // Leer nodo /usuarios/{username} en Firebase
      const snap = await get(ref(db, `usuarios/${username}`));

      if (!snap.exists()) {
        showError('Usuario no encontrado');
        btn.classList.remove('loading'); btn.disabled = false;
        return;
      }

      const data = snap.val();

      // Comparar contraseña (guardada en el nodo como "contrasena")
      if (data.contrasena !== password) {
        showError('Contraseña incorrecta');
        btn.classList.remove('loading'); btn.disabled = false;
        return;
      }

      // ✅ Login exitoso
      saveHistory(username);
      sessionStorage.setItem('loggedUser', username);
      sessionStorage.setItem('loggedRole', data.rol || 'usuario');

      // Actualizar último acceso en Firebase
      await set(ref(db, `usuarios/${username}/ultimoAcceso`), new Date().toISOString());

      // Redirigir al index
      window.location.href = 'index.html';

    } catch (err) {
      console.error(err);
      showError('Error de conexión con Firebase');
      btn.classList.remove('loading'); btn.disabled = false;
    }
  };

  // ══════════════════════════════════
  //   CAMBIAR CONTRASEÑA
  // ══════════════════════════════════
  window.openModal  = () => document.getElementById('modalOverlay').classList.add('show');
  window.closeModal = () => {
    document.getElementById('modalOverlay').classList.remove('show');
    ['m-user','m-old','m-new','m-confirm'].forEach(id => document.getElementById(id).value = '');
  };

  window.savePassword = async function() {
    const user    = document.getElementById('m-user').value.trim();
    const oldPass = document.getElementById('m-old').value;
    const newPass = document.getElementById('m-new').value;
    const confirm = document.getElementById('m-confirm').value;

    if (!user || !oldPass || !newPass || !confirm) {
      showToast('Completa todos los campos', 'error-t'); return;
    }
    if (newPass.length < 4) {
      showToast('La contraseña debe tener al menos 4 caracteres', 'error-t'); return;
    }
    if (newPass !== confirm) {
      showToast('Las contraseñas nuevas no coinciden', 'error-t'); return;
    }

    try {
      const snap = await get(ref(db, `usuarios/${user}`));
      if (!snap.exists()) { showToast('Usuario no encontrado', 'error-t'); return; }

      const data = snap.val();
      if (data.contrasena !== oldPass) {
        showToast('La contraseña actual es incorrecta', 'error-t'); return;
      }

      await set(ref(db, `usuarios/${user}/contrasena`), newPass);
      closeModal();
      showToast('✅ Contraseña actualizada correctamente', 'success');

    } catch (err) {
      console.error(err);
      showToast('Error al actualizar en Firebase', 'error-t');
    }
  };
</script>

</body>
</html>
