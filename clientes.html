<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Clientes — Jessica Peña Nails Spa</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --c-deep:#1a0030; --c-dark:#3a006f; --c-mid:#6A0DAD;
    --c-accent:#9b59b6; --c-light:#c39bd3; --c-soft:#e8d5f5;
    --c-white:#fff; --c-danger:#e74c3c; --c-success:#2ecc71;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;min-height:100vh;background:var(--c-deep);color:var(--c-white);overflow-x:hidden}
  .bg-dots{position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle,rgba(195,155,211,.06) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
  .bg-orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
  .orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(106,13,173,.3) 0%,transparent 70%);top:-100px;left:-100px}
  .orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(155,89,182,.2) 0%,transparent 70%);bottom:-80px;right:-80px}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:50;height:54px;background:rgba(26,0,48,.92);border-bottom:1px solid rgba(195,155,211,.18);display:flex;align-items:center;padding:0 20px;gap:12px;backdrop-filter:blur(12px)}
  .topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(195,155,211,.35),transparent)}
  .brand-ring{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--c-mid),var(--c-light));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 0 12px rgba(155,89,182,.4)}
  .topbar h1{font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:.05em;flex:1}
  .btn-back{background:rgba(195,155,211,.08);border:1px solid rgba(195,155,211,.22);border-radius:8px;color:var(--c-light);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;transition:background .2s;text-decoration:none;display:inline-flex;align-items:center}
  .btn-back:hover{background:rgba(195,155,211,.18)}

  /* LAYOUT */
  .page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 16px 48px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}
  @media(max-width:780px){.page{grid-template-columns:1fr}}

  /* CARD */
  .card{background:rgba(30,5,55,.72);border:1px solid rgba(195,155,211,.2);border-radius:14px;padding:22px 20px;backdrop-filter:blur(14px);position:relative}
  .card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(195,155,211,.3),transparent)}
  .card-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.06em;color:var(--c-soft);margin-bottom:18px;display:flex;align-items:center;gap:8px}

  /* FORM */
  .fg{margin-bottom:13px}
  .fl{display:block;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(195,155,211,.65);margin-bottom:5px}
  .iw{position:relative}
  .ii{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5;pointer-events:none}
  .fi{width:100%;height:40px;background:rgba(255,255,255,.05);border:1px solid rgba(195,155,211,.2);border-radius:9px;color:var(--c-white);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:0 12px 0 36px;outline:none;transition:border-color .2s,box-shadow .2s}
  .fi::placeholder{color:rgba(195,155,211,.3);font-weight:400}
  .fi:focus{border-color:rgba(155,89,182,.6);box-shadow:0 0 0 3px rgba(106,13,173,.2)}
  .fi.err{border-color:rgba(231,76,60,.55);box-shadow:0 0 0 3px rgba(231,76,60,.12)}
  .fi-ro{background:rgba(195,155,211,.06);color:rgba(195,155,211,.7);cursor:default}

  /* ROW 2 cols */
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* BUTTONS */
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
  .btn{height:38px;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .2s,transform .15s}
  .btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{background:linear-gradient(135deg,var(--c-mid),var(--c-accent));color:#fff;box-shadow:0 4px 14px rgba(106,13,173,.3)}
  .btn-success{background:linear-gradient(135deg,#1a8a4a,#2ecc71);color:#fff;box-shadow:0 4px 14px rgba(46,204,113,.25)}
  .btn-warn{background:linear-gradient(135deg,#b7770d,#f39c12);color:#fff}
  .btn-danger{background:linear-gradient(135deg,#a93226,#e74c3c);color:#fff}
  .btn-ghost{background:rgba(195,155,211,.08);border:1px solid rgba(195,155,211,.2);color:rgba(195,155,211,.75)}

  /* SEARCH BAR */
  .search-bar{display:flex;gap:8px;margin-bottom:14px}
  .search-bar .fi{height:36px;font-size:12px}

  /* TABLE */
  .tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(195,155,211,.15)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead th{background:rgba(106,13,173,.35);color:var(--c-light);font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:10px 10px;text-align:left;white-space:nowrap}
  tbody tr{border-bottom:1px solid rgba(195,155,211,.08);transition:background .15s;cursor:pointer}
  tbody tr:hover{background:rgba(195,155,211,.08)}
  tbody tr.selected{background:rgba(155,89,182,.2);border-color:rgba(155,89,182,.3)}
  tbody td{padding:9px 10px;color:rgba(232,213,245,.82)}
  .empty-row td{text-align:center;color:rgba(195,155,211,.4);padding:28px}

  /* BADGE ROL */
  .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(106,13,173,.3);color:var(--c-light);border:1px solid rgba(195,155,211,.22)}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(30,5,55,.97);border:1px solid rgba(195,155,211,.3);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--c-soft);z-index:200;white-space:nowrap;transition:transform .35s cubic-bezier(.2,.8,.3,1),opacity .35s;opacity:0;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.ok{border-color:rgba(46,204,113,.4);color:#82e6a4}
  .toast.err{border-color:rgba(231,76,60,.4);color:#f1948a}
  .toast.wrn{border-color:rgba(243,156,18,.4);color:#f8c471}

  /* SPINNER */
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* STAT ROW */
  .stat-row{display:flex;gap:8px;margin-bottom:14px}
  .stat-box{flex:1;background:rgba(195,155,211,.07);border:1px solid rgba(195,155,211,.15);border-radius:10px;padding:10px 12px;text-align:center}
  .stat-val{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--c-white)}
  .stat-lbl{font-size:10px;color:rgba(195,155,211,.5);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<header class="topbar">
  <div class="brand-ring">👥</div>
  <h1>Gestión de Clientes</h1>
  <a class="btn-back" href="javascript:window.close()">✕ Cerrar</a>
</header>

<div class="page">

  <!-- ═══ FORMULARIO ═══ -->
  <div class="card">
    <div class="card-title"><span>📋</span> Datos del Cliente</div>

    <div class="fg">
      <label class="fl">Código</label>
      <div class="iw"><span class="ii">#</span>
        <input class="fi fi-ro" id="f-codigo" readonly placeholder="Auto" onkeydown="en(event,'f-nombre')">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Nombre *</label>
      <div class="iw"><span class="ii">👤</span>
        <input class="fi" id="f-nombre" placeholder="Nombre completo" onkeydown="en(event,'f-telefono')">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Teléfono</label>
      <div class="iw"><span class="ii">📞</span>
        <input class="fi" id="f-telefono" placeholder="Número de teléfono" onkeydown="en(event,'f-cumple')">
      </div>
    </div>
    <div class="row2">
      <div class="fg">
        <label class="fl">Cumpleaños</label>
        <input class="fi" type="date" id="f-cumple" onkeydown="en(event,'f-alta')">
      </div>
      <div class="fg">
        <label class="fl">Fecha Alta</label>
        <input class="fi" type="date" id="f-alta" onkeydown="en(event,'btn-guardar')">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="nuevoCliente()">＋ Nuevo</button>
      <button class="btn btn-primary" id="btn-guardar" onclick="guardarCliente()">
        <span id="lbl-guardar">💾 Guardar</span><div class="spin" id="sp-guardar" style="display:none"></div>
      </button>
      <button class="btn btn-warn" onclick="actualizarCliente()">✏️ Actualizar</button>
      <button class="btn btn-danger" onclick="eliminarCliente()">🗑️ Eliminar</button>
    </div>
  </div>

  <!-- ═══ TABLA ═══ -->
  <div class="card">
    <div class="card-title"><span>👥</span> Lista de Clientes
      <button onclick="cargarClientes()" style="margin-left:auto;background:none;border:none;color:var(--c-muted);cursor:pointer;font-size:15px;color:rgba(195,155,211,.5)" title="Recargar">↻</button>
    </div>

    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box"><div class="stat-val" id="st-mes">—</div><div class="stat-lbl">Este mes</div></div>
      <div class="stat-box"><div class="stat-val" id="st-cumple">—</div><div class="stat-lbl">Cumple este mes</div></div>
    </div>

    <div class="search-bar">
      <div class="iw" style="flex:1"><span class="ii">🔍</span>
        <input class="fi" id="s-nombre" placeholder="Buscar por nombre..." oninput="filtrarClientes()">
      </div>
      <div class="iw" style="width:110px"><span class="ii">#</span>
        <input class="fi" id="s-codigo" placeholder="Código" oninput="filtrarClientes()">
      </div>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Código</th><th>Nombre</th><th>Teléfono</th><th>Cumpleaños</th><th>F. Alta</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr class="empty-row"><td colspan="5">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:"TU_API_KEY",
  authDomain:"jessicapenabeautystudio.firebaseapp.com",
  databaseURL:"https://jessicapenabeautystudio-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"jessicapenabeautystudio",
  storageBucket:"jessicapenabeautystudio.appspot.com",
  messagingSenderId:"TU_SENDER_ID",
  appId:"TU_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── ESTADO ──
let allClients = [];
let selectedKey = null;
const today = new Date().toISOString().split('T')[0];

// Fecha alta por defecto = hoy
document.getElementById('f-alta').value = today;

// ── TOAST ──
window.showToast = (msg, type='') => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 3400);
};

// ── ENTER navega ──
window.en = (e, nextId) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const el = document.getElementById(nextId);
  if (!el) return;
  if (el.tagName === 'BUTTON') el.click(); else el.focus();
};

// ── CARGAR CLIENTES ──
window.cargarClientes = async () => {
  try {
    const snap = await get(ref(db, 'clientes'));
    allClients = [];
    if (snap.exists()) {
      snap.forEach(child => {
        allClients.push({ key: child.key, ...child.val() });
      });
      allClients.sort((a,b) => a.codigo - b.codigo);
    }
    renderTabla(allClients);
    updateStats();
    generarSiguienteCodigo();
  } catch(err) {
    console.error(err);
    showToast('Error al cargar clientes','err');
  }
};

function renderTabla(list) {
  const tbody = document.getElementById('tbl-body');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No hay clientes registrados</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(c => `
    <tr data-key="${c.key}" class="${c.key===selectedKey?'selected':''}" onclick="seleccionarFila('${c.key}')">
      <td><span class="badge">${c.codigo||''}</span></td>
      <td>${c.nombre||''}</td>
      <td>${c.telefono||'—'}</td>
      <td>${c.cumpleanios||'—'}</td>
      <td>${c.fechaAlta||'—'}</td>
    </tr>`).join('');
}

function updateStats() {
  document.getElementById('st-total').textContent = allClients.length;
  const mes = new Date().getMonth() + 1;
  const anio = new Date().getFullYear();
  const esteMes = allClients.filter(c => {
    if (!c.fechaAlta) return false;
    const d = new Date(c.fechaAlta);
    return d.getMonth()+1===mes && d.getFullYear()===anio;
  }).length;
  const cumpleMes = allClients.filter(c => {
    if (!c.cumpleanios) return false;
    const m = parseInt(c.cumpleanios.split('-')[1]);
    return m === mes;
  }).length;
  document.getElementById('st-mes').textContent = esteMes;
  document.getElementById('st-cumple').textContent = cumpleMes;
}

function generarSiguienteCodigo() {
  if (!allClients.length) { document.getElementById('f-codigo').value = '0001'; return; }
  const maxCod = Math.max(...allClients.map(c => parseInt(c.codigo)||0));
  document.getElementById('f-codigo').value = String(maxCod+1).padStart(4,'0');
}

// ── FILTRAR ──
window.filtrarClientes = () => {
  const nombre = document.getElementById('s-nombre').value.toLowerCase();
  const codigo = document.getElementById('s-codigo').value.toLowerCase();
  const filtered = allClients.filter(c =>
    (!nombre || (c.nombre||'').toLowerCase().includes(nombre)) &&
    (!codigo || (c.codigo||'').toLowerCase().includes(codigo))
  );
  renderTabla(filtered);
};

// ── SELECCIONAR FILA ──
window.seleccionarFila = key => {
  selectedKey = key;
  const c = allClients.find(x => x.key === key);
  if (!c) return;
  document.getElementById('f-codigo').value    = c.codigo  || '';
  document.getElementById('f-nombre').value    = c.nombre  || '';
  document.getElementById('f-telefono').value  = c.telefono|| '';
  document.getElementById('f-cumple').value    = c.cumpleanios || '';
  document.getElementById('f-alta').value      = c.fechaAlta   || '';
  document.getElementById('lbl-guardar').textContent = '💾 Guardar';
  document.querySelectorAll('tbody tr').forEach(r => r.classList.toggle('selected', r.dataset.key===key));
};

// ── NUEVO CLIENTE ──
window.nuevoCliente = () => {
  selectedKey = null;
  document.getElementById('f-nombre').value   = '';
  document.getElementById('f-telefono').value = '';
  document.getElementById('f-cumple').value   = '';
  document.getElementById('f-alta').value     = today;
  generarSiguienteCodigo();
  document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
  document.getElementById('f-nombre').focus();
};

// ── GUARDAR CLIENTE ──
window.guardarCliente = async () => {
  const nombre   = document.getElementById('f-nombre').value.trim();
  const codigo   = document.getElementById('f-codigo').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();
  const cumple   = document.getElementById('f-cumple').value;
  const alta     = document.getElementById('f-alta').value;

  if (!nombre) {
    document.getElementById('f-nombre').classList.add('err');
    showToast('El nombre es obligatorio','err');
    setTimeout(()=>document.getElementById('f-nombre').classList.remove('err'),2500);
    return;
  }

  // Verificar duplicado de código
  const existe = allClients.find(c => c.codigo === codigo && c.key !== selectedKey);
  if (existe) { showToast(`El código ${codigo} ya existe`,'wrn'); return; }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  document.getElementById('lbl-guardar').style.display='none';
  document.getElementById('sp-guardar').style.display='block';

  try {
    const key = codigo; // usamos código como clave del nodo
    await set(ref(db, `clientes/${key}`), {
      codigo, nombre, telefono: telefono||'', cumpleanios: cumple||'', fechaAlta: alta||today,
      creadoEn: new Date().toISOString()
    });
    showToast(`✅ Cliente "${nombre}" guardado`,'ok');
    await cargarClientes();
    nuevoCliente();
  } catch(err) {
    console.error(err);
    showToast('Error al guardar en Firebase','err');
  }

  btn.disabled = false;
  document.getElementById('lbl-guardar').style.display='inline';
  document.getElementById('sp-guardar').style.display='none';
};

// ── ACTUALIZAR CLIENTE ──
window.actualizarCliente = async () => {
  if (!selectedKey) { showToast('Selecciona un cliente de la tabla','wrn'); return; }
  const nombre   = document.getElementById('f-nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio','err'); return; }
  const telefono = document.getElementById('f-telefono').value.trim();
  const cumple   = document.getElementById('f-cumple').value;
  const alta     = document.getElementById('f-alta').value;
  try {
    await update(ref(db, `clientes/${selectedKey}`), {
      nombre, telefono: telefono||'', cumpleanios: cumple||'', fechaAlta: alta||''
    });
    showToast(`✅ Cliente actualizado`,'ok');
    await cargarClientes();
  } catch(err) { showToast('Error al actualizar','err'); }
};

// ── ELIMINAR CLIENTE ──
window.eliminarCliente = async () => {
  if (!selectedKey) { showToast('Selecciona un cliente de la tabla','wrn'); return; }
  const c = allClients.find(x => x.key === selectedKey);
  if (!confirm(`¿Eliminar al cliente "${c?.nombre}"?`)) return;
  try {
    await remove(ref(db, `clientes/${selectedKey}`));
    showToast(`🗑️ Cliente eliminado`,'ok');
    selectedKey = null;
    await cargarClientes();
    nuevoCliente();
  } catch(err) { showToast('Error al eliminar','err'); }
};

// ── INICIAR ──
cargarClientes();
</script>
</body>
</html>
